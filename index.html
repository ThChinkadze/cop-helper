<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Единая База Законодательства</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #1e1e1e;
            --card-bg: #2d2d2d;
            --text-main: #cccccc;
            --text-title: #ffffff;
            --accent: #007acc;
            --stars: #ffd700;
            --uk-color: #e51400;
            --ak-color: #d77a00;
            --dk-color: #2b78e4;
            --success: #60a917;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls-container {
            width: 100%;
            max-width: 900px;
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--bg-color);
            padding-top: 10px;
            padding-bottom: 20px;
            box-shadow: 0 10px 15px -5px var(--bg-color);
        }

        #searchInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 18px;
            font-family: 'Nunito', sans-serif;
            background-color: #3c3c3c;
            color: white;
            border: 2px solid transparent;
            border-radius: 8px;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: border-color 0.2s;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        #searchInput:focus { border-color: var(--accent); }

        .tabs { display: flex; gap: 10px; width: 100%; overflow-x: auto; padding-bottom: 5px; }

        .tab-btn {
            flex: 1;
            padding: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            font-weight: 800;
            background-color: #3c3c3c;
            color: var(--text-main);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .tab-btn:hover { background-color: #4a4a4a; color: #fff; }
        .tab-btn[data-code="uk"].active { background-color: var(--uk-color); color: white; }
        .tab-btn[data-code="ak"].active { background-color: var(--ak-color); color: white; }
        .tab-btn[data-code="dk"].active { background-color: var(--dk-color); color: white; }

        #articlesContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin-top: 10px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.15s ease;
        }
        .card:hover { transform: translateY(-2px); }

        .card.uk { border-left: 5px solid var(--uk-color); }
        .card.ak { border-left: 5px solid var(--ak-color); }
        .card.dk { border-left: 5px solid var(--dk-color); }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .article-num { font-size: 22px; font-weight: 800; color: var(--text-title); cursor: pointer; }
        .article-num:hover { color: var(--accent); }
        
        .stars { color: var(--stars); font-size: 18px; letter-spacing: 2px; }
        .title { font-size: 16px; font-weight: 600; margin-bottom: 10px; color: var(--text-title); }
        .desc { font-size: 14px; line-height: 1.5; margin-bottom: 15px; flex-grow: 1; }
        .punishment { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .badge {
            background-color: #3c3c3c;
            padding: 6px 12px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
        }
        
        .badge.danger {
            background-color: #721c24;
            color: #f8d7da;
            border: 1px solid #f5c6cb;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            background: var(--success);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        .loader {
            text-align: center;
            font-size: 18px;
            margin-top: 50px;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <div class="controls-container">
        <input type="text" id="searchInput" placeholder="Поиск по статье, ситуации или ключевому слову...">
        <div class="tabs">
            <button class="tab-btn active" data-code="uk">Уголовный кодекс</button>
            <button class="tab-btn" data-code="ak">Административный кодекс</button> 
            <button class="tab-btn" data-code="dk">Дорожный кодекс</button>
        </div>
    </div>

    <div id="articlesContainer">
        <div class="loader">Синхронизация данных с таблицей...</div>
    </div>

    <div id="toast">Скопировано в буфер!</div>

    <script>
        const SHEET_ID = '1ECGNHLbqR8KuPV_QH1E0SO8mGUOm4WIYP-hWWR5PZ-U'; 
        const SHEET_NAME = encodeURIComponent('База данных'); 
        
        const TIMEOUT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_NAME}`;

        let parsedDatabase = [];
        let currentCode = "uk";
        
        const container = document.getElementById('articlesContainer');
        const searchInput = document.getElementById('searchInput');
        const toast = document.getElementById('toast');
        const tabButtons = document.querySelectorAll('.tab-btn');

        // Универсальное соответствие кодов (и латиница, и кириллица)
        const codeMap = {
            'UK': 'uk',
            'AK': 'ak',
            'DK': 'dk',
        };

        async function loadData() {
            try {
                const response = await fetch(TIMEOUT_URL);
                const text = await response.text();
                
                const jsonString = text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1);
                const json = JSON.parse(jsonString);
                const rows = json.table.rows;

                parsedDatabase = [];

                rows.forEach((row, index) => {
                    if (index === 0 || !row.c) return; 
                    
                    const cells = row.c;
                    const getVal = (idx) => (cells[idx] && cells[idx].v !== null) ? String(cells[idx].v).trim() : "";

                    // Чтение колонок по фактической структуре таблицы:
                    // 0:Кодекс, 1:Статья, 2:Заголовок, 3:Описание, 4:Звёзды, 5:Доп_мера, 6:Штраф, 7:Арест, 8:Судимость
                    let rawCode = getVal(0).toUpperCase(); 
                    let num = getVal(1);                  
                    let title = getVal(2);                
                    let desc = getVal(3);                 
                    let stars = getVal(4);                
                    let extraMeasure = getVal(5);         
                    let fine = getVal(6);                 
                    let arrest = getVal(7);               
                    let felony = getVal(8);               

                    if (!codeMap[rawCode] || !num) return;

                    let codeType = codeMap[rawCode];
                    let badges = [];

                    if (fine && fine !== "—" && fine !== "-") {
                        badges.push(`<span class="badge">💰 Штраф: ${fine}</span>`);
                    }
                    if (arrest && arrest !== "—" && arrest !== "-") {
                        badges.push(`<span class="badge">🕒 Арест: ${arrest}</span>`);
                    }
                    if (extraMeasure && extraMeasure !== "—" && extraMeasure !== "-") {
                        badges.push(`<span class="badge">⚠️ ${extraMeasure}</span>`);
                    }
                    if (felony && felony.toLowerCase().includes("судимость")) {
                        badges.push(`<span class="badge danger">⚖️ Судимость</span>`);
                    }

                    let starDisplay = "";
                    if (stars && stars !== "—" && stars !== "-") {
                        if (stars.includes('★')) {
                            starDisplay = stars;
                        } else {
                            let starCount = parseInt(stars.replace(/[^0-9]/g, '')) || 0;
                            starDisplay = '★'.repeat(starCount);
                        }
                    }

                    if (desc || title) {
                        parsedDatabase.push({
                            code: codeType,
                            num: num,
                            title: title || (desc.split(/[.\n]/)[0].trim() + '.'), 
                            desc: desc || title,
                            stars: starDisplay,
                            badges: badges
                        });
                    }
                });

                renderArticles();
            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="loader" style="color:var(--uk-color)">Ошибка подключения. Убедитесь, что таблица доступна по ссылке («Все, у кого есть ссылка — Читатель»).</div>`;
            }
        }

        function renderArticles() {
            container.innerHTML = "";
            const filterText = searchInput.value.toLowerCase().trim();
            let count = 0;

            parsedDatabase.forEach(article => {
                if (article.code === currentCode) {
                    const matchesSearch = !filterText || 
                                          article.num.toLowerCase().includes(filterText) || 
                                          article.desc.toLowerCase().includes(filterText) ||
                                          article.title.toLowerCase().includes(filterText);

                    if (matchesSearch) {
                        count++;
                        const card = document.createElement('div');
                        card.className = `card ${article.code}`;
                        
                        let badgesHtml = article.badges.join('');
                        
                        card.innerHTML = `
                            <div class="card-header">
                                <div class="article-num" onclick="copyToClipboard('${article.num} ${article.code.toUpperCase()} - ${article.title}')">
                                    ${article.num}
                                </div>
                                ${article.stars ? `<div class="stars">${article.stars}</div>` : ''}
                            </div>
                            <div class="title">${article.title}</div>
                            <div class="desc">${article.desc.replace(/\n/g, '<br>')}</div>
                            <div class="punishment">${badgesHtml}</div>
                        `;
                        container.appendChild(card);
                    }
                }
            });

            if (count === 0) {
                container.innerHTML = `<div class="loader">Ничего не найдено...</div>`;
            }
        }

        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                tabButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                currentCode = button.getAttribute('data-code');
                renderArticles();
            });
        });

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                toast.style.opacity = 1;
                setTimeout(() => toast.style.opacity = 0, 1500);
            }).catch(err => {
                console.error('Не удалось скопировать: ', err);
            });
        }

        searchInput.addEventListener('input', renderArticles);
        loadData();
    </script>
</body>
</html>
